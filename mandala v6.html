<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>宇宙銀行預金∞｜曼荼羅瞑想</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#020818;
  font-family:'Noto Serif JP',serif;
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;
  padding:14px 8px 22px;
  gap:10px;
  overflow-y:auto;
}
.aurora{
  position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 70% 50% at 15% 25%,rgba(20,180,120,0.18) 0%,transparent 55%),
    radial-gradient(ellipse 60% 70% at 85% 15%,rgba(100,20,180,0.22) 0%,transparent 55%),
    radial-gradient(ellipse 100% 80% at 50% 60%,rgba(10,30,120,0.5) 0%,transparent 70%),
    radial-gradient(ellipse 120% 120% at 50% 50%,#020818 35%,#04102a 100%);
  animation:au 14s ease-in-out infinite alternate;
}
@keyframes au{
  0%{filter:hue-rotate(0deg) brightness(1);}
  50%{filter:hue-rotate(15deg) brightness(1.12);}
  100%{filter:hue-rotate(-8deg) brightness(0.95);}
}
.stars{position:fixed;inset:0;z-index:1;}
.star{position:absolute;border-radius:50%;background:white;animation:tw var(--d) ease-in-out infinite alternate;}
@keyframes tw{from{opacity:var(--a);}to{opacity:var(--b);}}

.content{position:relative;z-index:10;width:100%;max-width:360px;display:flex;flex-direction:column;align-items:center;gap:10px;}

.title{color:rgba(220,235,255,0.8);font-size:12px;letter-spacing:0.45em;text-align:center;line-height:2.2;text-shadow:0 0 15px rgba(100,180,255,0.4);}
.inf{font-size:20px;background:linear-gradient(135deg,#c0e0ff,#ffd080,#c0e0ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 8px rgba(200,220,255,0.5));}

.canvas-wrap{filter:drop-shadow(0 0 30px rgba(60,140,255,0.5)) drop-shadow(0 0 70px rgba(30,80,200,0.25));}
canvas{display:block;}
#waveCanvas{border-radius:5px;background:rgba(2,6,24,0.8);border:1px solid rgba(80,140,255,0.2);}

.btext{font-size:17px;letter-spacing:0.38em;text-align:center;min-height:24px;margin-bottom:7px;transition:color 0.8s,text-shadow 0.8s;}
.pbar{width:160px;height:1.5px;background:rgba(60,100,200,0.2);border-radius:1px;overflow:hidden;margin:0 auto 10px;}
.pfill{height:100%;background:linear-gradient(90deg,#4488ff,#ffd080);width:0%;transition:width .1s linear;}

.btns{display:flex;gap:8px;width:100%;}
.btn{
  flex:1;padding:10px 6px;border-radius:25px;
  background:rgba(8,16,60,0.8);
  border:1px solid rgba(80,140,255,0.35);
  color:rgba(180,215,255,0.9);
  font-family:'Noto Serif JP',serif;font-size:11px;letter-spacing:0.1em;
  cursor:pointer;transition:all .3s;
}
.btn.on1{background:rgba(8,45,25,0.9);border-color:rgba(80,255,160,0.5);color:rgba(160,255,200,0.95);}
.btn.on2{background:rgba(35,8,85,0.9);border-color:rgba(160,80,255,0.6);animation:pb 1.2s ease-in-out infinite;}
@keyframes pb{0%,100%{box-shadow:0 0 12px rgba(130,60,255,0.4);}50%{box-shadow:0 0 28px rgba(130,60,255,0.7);}}
.foot{color:rgba(100,140,220,0.35);font-size:9px;letter-spacing:0.2em;text-align:center;}
</style>
</head>
<body>
<div class="aurora"></div>
<div class="stars" id="st"></div>

<div class="content">
  <div class="title">あなたの宇宙銀行預金は、<br><span class="inf">∞ です。</span></div>
  <div class="canvas-wrap">
    <canvas id="mandalaCanvas" width="300" height="300"></canvas>
  </div>
  <canvas id="waveCanvas" width="300" height="50"></canvas>
  <div>
    <div class="btext" id="bt">ゆっくりと息を吸って…</div>
    <div class="pbar"><div class="pfill" id="pf"></div></div>
  </div>
  <div class="btns">
    <button class="btn" id="b1">🎵 432Hz BGM</button>
    <button class="btn" id="b2">🎙 声で変化</button>
  </div>
  <div class="btns">
    <button class="btn" id="b3" style="max-width:200px;">⏸ 一時停止</button>
  </div>
  <div class="foot">厄除け・セロトニン増加 曼荼羅｜Protection &amp; Serotonin Boost</div>
</div>

<script>
// 星
const stEl=document.getElementById('st');
for(let i=0;i<100;i++){
  const s=document.createElement('div');s.className='star';
  const z=Math.random()*2+0.3;
  s.style.cssText=`width:${z}px;height:${z}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*6}s;--a:${.03+Math.random()*.1};--b:${.3+Math.random()*.55};animation-delay:${Math.random()*6}s`;
  stEl.appendChild(s);
}

const mc=document.getElementById('mandalaCanvas');
const mx=mc.getContext('2d');
const wc=document.getElementById('waveCanvas');
const wx=wc.getContext('2d');
const CX=150,CY=150,WW=300,WH=50;

const BJ=['ॐ','अ','आ','क','ह','श','ष','स','व','य','र','ल','त','न','ध','भ','ग','ज','ब','च','ख','घ','ळ','ऋ','ए','ओ'];

let angle=0,angle2=0,angle3=0,ticker=0,lastT=null;
let voice=0,voiceMem=[];
let waveArr=new Float32Array(WW).fill(0),wavePos=0,waveDir=1;
let bPhase=0,bTime=0,bScale=1,bBright=1,bWarm=0,bGlow=0.5;

const BDUR=[4000,2000,6000,2000];
const BLBL=['ゆっくりと息を吸って…','そのまま…','ゆっくりと吐いて…','そのまま…'];
const BCOL=['rgba(160,220,255,.95)','rgba(255,220,120,.95)','rgba(140,200,255,.75)','rgba(180,160,220,.85)'];
const BSHD=['0 0 18px rgba(100,200,255,.8)','0 0 22px rgba(255,200,80,.8)','0 0 12px rgba(80,160,255,.5)','0 0 15px rgba(160,120,255,.6)'];

const btEl=document.getElementById('bt'),pfEl=document.getElementById('pf');
btEl.style.color=BCOL[0];btEl.style.textShadow=BSHD[0];

function sinEase(t){return(1-Math.cos(t*Math.PI))/2;}

function updateBreath(dt){
  bTime+=dt;const dur=BDUR[bPhase];
  pfEl.style.width=Math.min(bTime/dur*100,100)+'%';
  const t=Math.min(bTime/dur,1);
  if(bPhase===0){bScale=.88+.25*sinEase(t);bBright=1+t*.35;bWarm=t*.5;bGlow=.5+t*.5;}
  else if(bPhase===1){bScale=1.13;bBright=1.35;bWarm=.5;bGlow=1;}
  else if(bPhase===2){bScale=1.13-.25*sinEase(t);bBright=1.35-t*.45;bWarm=.5-t*.5;bGlow=1-t*.5;}
  else{bScale=.88;bBright=.9;bWarm=0;bGlow=.5;}
  if(bTime>=dur){
    bTime=0;bPhase=(bPhase+1)%4;
    btEl.textContent=BLBL[bPhase];
    btEl.style.color=BCOL[bPhase];
    btEl.style.textShadow=BSHD[bPhase];
  }
}

// BGM
let bgmAC=null,bgmOn=false,bgmMaster=null;
const b1=document.getElementById('b1');
function startBGM(){
  bgmAC=new(window.AudioContext||window.webkitAudioContext)();
  const rvLen=bgmAC.sampleRate*5;
  const rvBuf=bgmAC.createBuffer(2,rvLen,bgmAC.sampleRate);
  for(let c=0;c<2;c++){const d=rvBuf.getChannelData(c);for(let i=0;i<rvLen;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/rvLen,3);}
  const rv=bgmAC.createConvolver();rv.buffer=rvBuf;
  const rvG=bgmAC.createGain();rvG.gain.value=0.45;
  rv.connect(rvG);rvG.connect(bgmAC.destination);
  bgmMaster=bgmAC.createGain();bgmMaster.gain.value=0.35;
  bgmMaster.connect(bgmAC.destination);bgmMaster.connect(rv);
  const bLFO=bgmAC.createOscillator();const bLFOG=bgmAC.createGain();
  bLFO.frequency.value=0.033;bLFOG.gain.value=0.14;
  bLFO.connect(bLFOG);bLFOG.connect(bgmMaster.gain);bLFO.start();
  const dLFO=bgmAC.createOscillator();const dLFOG=bgmAC.createGain();
  dLFO.frequency.value=0.016;dLFOG.gain.value=0.09;
  dLFO.connect(dLFOG);dLFOG.connect(bgmMaster.gain);dLFO.start();
  [[108,'sine',.07,.025,0],[216,'sine',.06,.033,-.25],[432,'sine',.08,.05,0],
   [528,'sine',.025,.042,.2],[648,'triangle',.03,.07,-.2],[864,'triangle',.018,.06,.35],[324,'sine',.03,.08,-.35]
  ].forEach(([freq,type,vol,lfoHz,pan])=>{
    const o=bgmAC.createOscillator();const g=bgmAC.createGain();const p=bgmAC.createStereoPanner();
    o.type=type;o.frequency.value=freq;g.gain.value=vol;p.pan.value=pan;
    const l=bgmAC.createOscillator();const lg=bgmAC.createGain();
    l.frequency.value=lfoHz;lg.gain.value=vol*.5;l.connect(lg);lg.connect(g.gain);l.start();
    const pl=bgmAC.createOscillator();const plg=bgmAC.createGain();
    pl.frequency.value=0.06+Math.random()*.04;plg.gain.value=freq*.0015;
    pl.connect(plg);plg.connect(o.frequency);pl.start();
    o.connect(g);g.connect(p);p.connect(bgmMaster);o.start();
  });
  function bell(){
    if(!bgmAC||!bgmOn)return;
    const t=bgmAC.currentTime;
    [432,648,864].forEach((f,i)=>{
      const o=bgmAC.createOscillator();const e=bgmAC.createGain();
      o.type='sine';o.frequency.setValueAtTime(f,t+i*.03);o.frequency.exponentialRampToValueAtTime(f*.993,t+6);
      e.gain.setValueAtTime(0,t);e.gain.linearRampToValueAtTime(.05-i*.012,t+.02);e.gain.exponentialRampToValueAtTime(.001,t+6);
      o.connect(e);e.connect(rv);o.start(t);o.stop(t+6.5);
    });
    setTimeout(bell,20000+Math.random()*15000);
  }
  setTimeout(bell,3000);
}
b1.addEventListener('click',()=>{
  if(bgmOn){if(bgmAC){bgmAC.close();bgmAC=null;bgmMaster=null;}bgmOn=false;b1.textContent='🎵 432Hz BGM';b1.classList.remove('on1');}
  else{startBGM();bgmOn=true;b1.textContent='🔊 再生中…';b1.classList.add('on1');}
});

// マイク
let micAC=null,micAnalyser=null,micStream=null,micOn=false;
const b2=document.getElementById('b2');
b2.addEventListener('click',async()=>{
  if(micOn){micOn=false;b2.textContent='🎙 声で変化';b2.classList.remove('on2');if(micStream)micStream.getTracks().forEach(t=>t.stop());return;}
  try{
    const s=await navigator.mediaDevices.getUserMedia({audio:true});
    micAC=new(window.AudioContext||window.webkitAudioContext)();
    micAnalyser=micAC.createAnalyser();micAnalyser.fftSize=512;
    micAC.createMediaStreamSource(s).connect(micAnalyser);
    micStream=s;micOn=true;b2.textContent='🔴 聞いています…';b2.classList.add('on2');
  }catch(e){b2.textContent='🎙 マイクを許可';}
});
function getVoice(){
  if(!micOn||!micAnalyser)return 0;
  const d=new Uint8Array(micAnalyser.frequencyBinCount);
  micAnalyser.getByteFrequencyData(d);
  return Math.min(d.reduce((a,b)=>a+b,0)/d.length/65,1);
}

// ---- マンダラ描画ヘルパー ----

// 楕円形の花びら
function sharpPetal(ctx, r, w, h, a0, n, fillCol, strokeCol, lw){
  ctx.save();ctx.rotate(a0);
  for(let i=0;i<n;i++){
    const a=(i/n)*Math.PI*2;
    ctx.save();ctx.rotate(a);
    ctx.beginPath();
    ctx.ellipse(0,-(r+h*.3),w,h,0,0,Math.PI*2);
    if(fillCol){ctx.fillStyle=fillCol;ctx.fill();}
    if(strokeCol){ctx.strokeStyle=strokeCol;ctx.lineWidth=lw||1.2;ctx.stroke();}
    // 内側の縦線（繊細な装飾）
    ctx.beginPath();ctx.moveTo(0,-(r-h*.2));ctx.lineTo(0,-(r+h*.9));
    ctx.strokeStyle=strokeCol||'rgba(200,180,100,.3)';ctx.lineWidth=.4;ctx.stroke();
    ctx.restore();
  }
  ctx.restore();
}

// 尖った多角形
function sharpPoly(ctx, n, r, a0, stroke, lw){
  ctx.save();ctx.rotate(a0);ctx.beginPath();
  for(let i=0;i<=n;i++){
    const a=(i/n)*Math.PI*2-Math.PI/2;
    i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
  }
  ctx.closePath();ctx.strokeStyle=stroke;ctx.lineWidth=lw||1;ctx.stroke();ctx.restore();
}

// 内側ラインの重なり
function innerLines(ctx, n, r1, r2, a0, col, lw){
  ctx.save();ctx.rotate(a0);
  for(let i=0;i<n;i++){
    const a=(i/n)*Math.PI*2;
    const a2=((i+1)/n)*Math.PI*2;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a)*r1,Math.sin(a)*r1);
    ctx.lineTo(Math.cos(a)*r2,Math.sin(a)*r2);
    ctx.lineTo(Math.cos(a2)*r2,Math.sin(a2)*r2);
    ctx.strokeStyle=col;ctx.lineWidth=lw||.5;ctx.stroke();
  }
  ctx.restore();
}

function dots(n,r,a0,col,sz){
  mx.save();mx.rotate(a0);
  for(let i=0;i<n;i++){const a=(i/n)*Math.PI*2;mx.beginPath();mx.arc(Math.cos(a)*r,Math.sin(a)*r,sz,0,Math.PI*2);mx.fillStyle=col;mx.fill();}
  mx.restore();
}

function bijaring(n,r,a0,op,sz){
  mx.save();mx.rotate(a0);
  for(let i=0;i<n;i++){
    const a=(i/n)*Math.PI*2;
    mx.save();mx.translate(Math.cos(a)*r,Math.sin(a)*r);mx.rotate(a+Math.PI/2);
    mx.fillStyle=`rgba(220,200,115,${op})`;mx.font=`${sz}px serif`;
    mx.textAlign='center';mx.textBaseline='middle';
    mx.shadowColor='rgba(180,150,60,.75)';mx.shadowBlur=6;
    mx.fillText(BJ[(i*5+Math.floor(ticker*.0003))%BJ.length],0,0);mx.shadowBlur=0;mx.restore();
  }
  mx.restore();
}

// ---- メインマンダラ ----
function drawMandala(){
  mx.clearRect(0,0,300,300);
  const v=voice, sc=bScale+v*.08;
  const warm=bWarm, glow=bGlow, bright=bBright;
  const rC=Math.round(15+warm*45),gC=Math.round(40+warm*22),bC=Math.round(170-warm*32);

  mx.save();mx.translate(CX,CY);mx.scale(sc,sc);

  // 背景グロー
  const bgG=mx.createRadialGradient(0,0,0,0,0,108);
  bgG.addColorStop(0,`rgba(${rC},${gC},${bC},${(.15+v*.08)*bright})`);
  bgG.addColorStop(.5,`rgba(${Math.round(rC*.4)},${Math.round(gC*.4)},${Math.round(bC*.5)},.06)`);
  bgG.addColorStop(1,'rgba(0,0,0,0)');
  mx.beginPath();mx.arc(0,0,110,0,Math.PI*2);mx.fillStyle=bgG;mx.fill();

  // ===== 最外層：大きな尖り花びら8枚 =====
  sharpPetal(mx,82,11,22,angle*.2,8,
    `rgba(15,45,160,${.12+v*.06})`,
    `rgba(200,175,75,${.8+v*.15})`,1.5);

  // 外側の補助尖り（小さめ・間に挟む）
  sharpPetal(mx,80,6,14,angle*.2+Math.PI/8,8,
    null,
    `rgba(160,215,255,${.5+v*.12})`,1.0);

  // ===== 外輪の多角形ライン =====
  sharpPoly(mx,16,96,angle*.3,`rgba(160,215,255,${.55+v*.1})`,1.3);
  sharpPoly(mx,16,90,angle*.3+Math.PI/16,`rgba(200,175,75,.45)`,.9);

  // 外輪内側ライン（繊細な装飾）
  innerLines(mx,16,86,94,angle*.3,`rgba(140,195,255,${.2+v*.06})`,.5);

  // 外ドット
  dots(24,98,angle*.25,`rgba(210,180,78,${.5+v*.14})`,1.8);
  dots(32,92,angle*.3,`rgba(100,160,255,${.18+v*.07})`,1);

  // 外梵字
  bijaring(12,100,angle*.3,.65+v*.15,9);

  // ===== 第2層：中サイズ尖り花びら12枚 =====
  sharpPetal(mx,76,9,20,-angle2*.4,12,
    `rgba(12,38,150,${.15+v*.07})`,
    `rgba(140,205,255,${.58+v*.12})`,1.3);

  sharpPoly(mx,12,86,angle2*.35,`rgba(160,210,255,${.3+v*.07})`,.8);
  sharpPoly(mx,12,80,angle2*.35+Math.PI/12,`rgba(180,155,65,.28)`,.55);
  innerLines(mx,12,76,84,angle2*.35,`rgba(120,185,255,${.18+v*.05})`,.45);
  dots(16,88,-angle2*.4,`rgba(200,175,80,.42)`,1.5);
  bijaring(8,84,-angle2*.35,.6+v*.12,10);

  // ===== 第3層：小さめ尖り花びら16枚 =====
  sharpPetal(mx,55,6,14,angle*.6,16,
    `rgba(10,30,130,${.18+v*.08})`,
    `rgba(120,195,255,${.55+v*.1})`,1.3);

  sharpPoly(mx,8,64,angle*.55,`rgba(80,150,255,${.38+v*.08})`,1);
  sharpPoly(mx,8,59,-angle*.55+Math.PI/8,`rgba(175,150,62,.35)`,.7);
  innerLines(mx,8,55,63,angle*.55,`rgba(80,150,255,${.18+v*.06})`,.5);
  dots(12,66,angle*.5,`rgba(200,175,80,.4)`,1.4);
  bijaring(6,62,angle*.55,.55+v*.12,10);

  // ===== 第4層：最内層 尖り花びら8枚 =====
  sharpPetal(mx,37,5,11,-angle*.8,8,
    `rgba(8,25,110,${.22+v*.09})`,
    `rgba(160,215,255,${.62+v*.12})`,1.3);

  sharpPoly(mx,8,44,-angle*.75,`rgba(180,155,65,.4)`,.85);
  sharpPoly(mx,8,39,-angle*.75+Math.PI/8,`rgba(80,150,255,${.32+v*.07})`,.65);
  dots(10,46,-angle*.7,`rgba(200,175,80,.45)`,1.5);
  bijaring(6,42,-angle*.75,.52+v*.1,9);

  // ===== 最内層：小さな尖り6枚 =====
  sharpPetal(mx,23,4,8,angle3,6,
    `rgba(6,20,90,${.28+v*.1})`,
    `rgba(180,225,255,${.65+v*.12})`,1.1);
  sharpPoly(mx,6,28,angle3,`rgba(190,165,70,.38)`,.75);
  dots(10,29,angle3*1.5,`rgba(210,185,103,.58)`,1.3);

  // 声の光線
  if(v>.04){
    for(let i=0;i<16;i++){
      const a=(i/16)*Math.PI*2+angle;
      mx.beginPath();mx.moveTo(Math.cos(a)*25,Math.sin(a)*25);
      mx.lineTo(Math.cos(a)*(100+v*12),Math.sin(a)*(138+v*16));
      mx.strokeStyle=`rgba(160,215,255,${v*.12})`;mx.lineWidth=.4;mx.stroke();
    }
  }

  // ===== 中心グロー =====
  const cr=Math.round(148+warm*50),cg2=Math.round(190+warm*18),cb2=Math.round(255-warm*25);
  const cgr=mx.createRadialGradient(0,0,0,0,0,26+glow*7);
  cgr.addColorStop(0,`rgba(${cr},${cg2},${cb2},${(.88+v*.1)*bright})`);
  cgr.addColorStop(.3,`rgba(${Math.round(cr*.5)},${Math.round(cg2*.6)},230,${.78*bright})`);
  cgr.addColorStop(.65,`rgba(28,55,170,${.5*bright})`);
  cgr.addColorStop(1,'rgba(6,14,68,0)');
  mx.beginPath();mx.arc(0,0,22+v*8+glow*4,0,Math.PI*2);mx.fillStyle=cgr;mx.fill();

  dots(10,17,angle*2,`rgba(210,185,103,.62)`,1.4);

  // 中心ॐ
  mx.fillStyle=`rgba(240,220,138,${.88+v*.1})`;
  mx.font=`${15+v*6}px serif`;
  mx.textAlign='center';mx.textBaseline='middle';
  mx.shadowColor='rgba(200,170,78,.92)';mx.shadowBlur=12+v*16;
  mx.fillText('ॐ',0,0);mx.shadowBlur=0;

  mx.restore();
}

// 波形
function drawWave(){
  wx.clearRect(0,0,WW,WH);
  if(waveDir===1){wavePos++;if(wavePos>=WW-1)waveDir=-1;}
  else{wavePos--;if(wavePos<=0)waveDir=1;}
  waveArr[wavePos]=voice;
  const bW=3,gap=1,total=Math.floor(WW/(bW+gap));
  for(let i=0;i<total;i++){
    const idx=Math.round(i/(total-1)*(WW-1));
    const v2=waveArr[idx];
    const h=Math.max(2,v2*(WH-5));
    const x=i*(bW+gap),y=(WH-h)/2;
    const dist=Math.abs(idx-wavePos)/WW;
    const r=Math.round(45+dist*168),g=Math.round(115+dist*50),b=Math.round(250-dist*70);
    const al=.2+v2*.62;
    const gr=wx.createLinearGradient(x,y,x,y+h);
    gr.addColorStop(0,`rgba(${r},${g},${b},${al*.45})`);
    gr.addColorStop(.5,`rgba(${r},${g},${b},${al})`);
    gr.addColorStop(1,`rgba(${r},${g},${b},${al*.45})`);
    wx.fillStyle=gr;wx.beginPath();wx.roundRect(x,y,bW,h,1);wx.fill();
  }
  const px=wavePos/(WW-1)*WW;
  wx.beginPath();wx.moveTo(px,2);wx.lineTo(px,WH-2);
  wx.strokeStyle=`rgba(200,228,255,${.3+voice*.35})`;wx.lineWidth=1.5;wx.stroke();
  wx.beginPath();wx.moveTo(0,WH/2);wx.lineTo(WW,WH/2);
  wx.strokeStyle='rgba(45,85,190,.1)';wx.lineWidth=.5;wx.stroke();
}

// 停止・再生制御
let isPaused = false;
const b3 = document.getElementById('b3');
b3.addEventListener('click', () => {
  isPaused = !isPaused;
  if(isPaused){
    // 停止：BGMもミュート
    if(bgmMaster) bgmMaster.gain.setTargetAtTime(0, 0, 0.3);
    b3.textContent = '▶ 再生';
    b3.style.borderColor = 'rgba(80,255,160,0.5)';
    b3.style.color = 'rgba(160,255,200,0.95)';
  } else {
    // 再生再開：BGM音量を戻す
    if(bgmMaster && bgmOn) bgmMaster.gain.setTargetAtTime(0.35, 0, 0.3);
    b3.textContent = '⏸ 一時停止';
    b3.style.borderColor = 'rgba(80,140,255,0.35)';
    b3.style.color = 'rgba(180,215,255,0.9)';
  }
});

// ループ
function loop(t){
  if(!lastT)lastT=t;const dt=t-lastT;lastT=t;ticker=t;
  const raw=getVoice();voiceMem.push(raw);if(voiceMem.length>8)voiceMem.shift();
  voice=voiceMem.reduce((a,b)=>a+b,0)/voiceMem.length;
  if(!isPaused){
    updateBreath(dt);
    if(bgmMaster&&bgmOn){bgmMaster.gain.setTargetAtTime(0.3+(bGlow||.5)*.18,0,.5);}
    const sp=.00012+voice*.001;
    angle+=sp*dt;angle2+=sp*1.5*dt;angle3+=sp*.45*dt;
    drawMandala();drawWave();
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
