<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>宇宙銀行預金∞｜厄除け・セロトニン増加 曼荼羅</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:#020a1e;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:100vh;
  font-family:'Noto Serif JP',serif;
  overflow:hidden;
  cursor:default;
}

/* オーロラ背景 */
.aurora{
  position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 30%, rgba(30,80,200,0.35) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 80% 20%, rgba(80,20,180,0.25) 0%, transparent 60%),
    radial-gradient(ellipse 100% 50% at 50% 80%, rgba(0,40,120,0.4) 0%, transparent 70%),
    radial-gradient(ellipse 120% 120% at 50% 50%, #020a1e 40%, #050f2e 100%);
  animation: auroraShift 12s ease-in-out infinite alternate;
}
@keyframes auroraShift{
  0%{filter:hue-rotate(0deg) brightness(1);}
  50%{filter:hue-rotate(20deg) brightness(1.15);}
  100%{filter:hue-rotate(-10deg) brightness(0.95);}
}

/* 星 */
.stars{position:fixed;inset:0;z-index:1;}
.star{position:absolute;border-radius:50%;background:white;animation:tw var(--d) ease-in-out infinite alternate;}
@keyframes tw{from{opacity:var(--a);}to{opacity:var(--b);transform:scale(1.8);}}

/* メインコンテナ */
.container{
  position:relative;z-index:10;
  display:flex;flex-direction:column;
  align-items:center;gap:12px;
  padding:16px;
}

/* タイトル */
.title-top{
  color:rgba(200,230,255,0.8);
  font-size:13px;letter-spacing:0.5em;
  text-align:center;line-height:2;
  text-shadow:0 0 20px rgba(100,180,255,0.5);
}
.title-inf{
  font-size:22px;
  background:linear-gradient(135deg,#a0d4ff,#ffd080,#a0d4ff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  filter:drop-shadow(0 0 10px rgba(160,212,255,0.6));
}

/* Canvasラッパー */
.canvas-wrap{
  position:relative;
  filter:
    drop-shadow(0 0 30px rgba(80,160,255,0.5))
    drop-shadow(0 0 80px rgba(60,100,220,0.3))
    drop-shadow(0 0 120px rgba(40,60,180,0.2));
}

canvas#mandala{display:block;}

/* 波形 */
canvas#wave{
  display:block;
  border-radius:8px;
  background:rgba(2,8,30,0.7);
  border:1px solid rgba(80,140,255,0.2);
  box-shadow:0 0 15px rgba(60,100,200,0.15);
}

/* 呼吸ガイド */
.breath-wrap{text-align:center;}
.breath-text{
  font-size:14px;letter-spacing:0.4em;
  color:rgba(200,230,255,0.85);
  min-height:22px;margin-bottom:8px;
  text-shadow:0 0 10px rgba(100,180,255,0.4);
}
.pbar{width:180px;height:1.5px;background:rgba(60,100,200,0.2);border-radius:1px;overflow:hidden;margin:0 auto 12px;}
.pfill{height:100%;background:linear-gradient(90deg,#4488ff,#ffd080);width:0%;transition:width .1s linear;}

/* ボタン群 */
.btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}

.btn{
  background:rgba(10,20,70,0.7);
  border:1px solid rgba(80,140,255,0.35);
  color:rgba(180,215,255,0.9);
  padding:9px 22px;border-radius:30px;
  font-family:'Noto Serif JP',serif;
  font-size:12px;letter-spacing:0.2em;
  cursor:pointer;transition:all .3s;
  backdrop-filter:blur(10px);
  white-space:nowrap;
}
.btn:hover{
  background:rgba(25,55,160,0.8);
  border-color:rgba(140,200,255,0.6);
  box-shadow:0 0 18px rgba(60,120,255,0.3);
}
.btn.active{
  background:rgba(40,10,90,0.85);
  border-color:rgba(160,80,255,0.6);
  animation:pb 1.2s ease-in-out infinite;
}
.btn.bgm-on{
  background:rgba(10,50,30,0.85);
  border-color:rgba(80,255,160,0.5);
  color:rgba(160,255,200,0.95);
}
@keyframes pb{
  0%,100%{box-shadow:0 0 15px rgba(130,60,255,0.4);}
  50%{box-shadow:0 0 35px rgba(130,60,255,0.7);}
}

/* フッター */
.footer-text{
  color:rgba(140,180,255,0.45);
  font-size:10px;letter-spacing:0.3em;
  text-align:center;
}
</style>
</head>
<body>

<div class="aurora"></div>
<div class="stars" id="st"></div>

<div class="container">
  <div class="title-top">
    あなたの宇宙銀行預金は、<br>
    <span class="title-inf">∞ です。</span>
  </div>

  <div class="canvas-wrap">
    <canvas id="mandala" width="420" height="420"></canvas>
  </div>

  <canvas id="wave" width="420" height="64"></canvas>

  <div class="breath-wrap">
    <div class="breath-text" id="bt">ゆっくりと息を吸って…</div>
    <div class="pbar"><div class="pfill" id="pf"></div></div>
  </div>

  <div class="btns">
    <button class="btn" id="bgmBtn">🎵 432Hz BGMを開始</button>
    <button class="btn" id="micBtn">🎙 声で変化させる</button>
  </div>

  <div class="footer-text">厄除け・セロトニン増加 曼荼羅｜Protection &amp; Serotonin Boost</div>
</div>

<script>
// ── 星 ──
const stEl=document.getElementById('st');
for(let i=0;i<120;i++){
  const s=document.createElement('div');s.className='star';
  const z=Math.random()*2+0.3;
  s.style.cssText=`width:${z}px;height:${z}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*6}s;--a:${.04+Math.random()*.12};--b:${.35+Math.random()*.55};animation-delay:${Math.random()*6}s`;
  stEl.appendChild(s);
}

// ── Canvas ──
const mc=document.getElementById('mandala'),mx=mc.getContext('2d');
const wc=document.getElementById('wave'),wx=wc.getContext('2d');
const SZ=420,CX=210,CY=210,WW=420,WH=64;

// 梵字
const BJ=['ॐ','अ','आ','क','ह','श','ष','स','व','य','र','ल','त','न','ध','भ','ग','ज','ब','च','ख','घ','ळ','ऋ','ए','ओ'];

// ── 状態 ──
let rot=0,rot2=0,rot3=0,ts=0,lt=null;
let vl=0,vm=[];
let wBuf=new Float32Array(WW).fill(0),wPos=0,wDir=1;
let bPhase=0,bTimer=0,bScale=1;
const bDur=[4000,2000,6000,2000];
const bLbl=['ゆっくりと息を吸って…','そのまま…','ゆっくりと吐いて…','そのまま…'];
const btEl=document.getElementById('bt'),pfEl=document.getElementById('pf');

// ── 432Hz BGM ──
let bgmCtx=null,bgmNodes=[],bgmOn=false;
const bgmBtn=document.getElementById('bgmBtn');

function startBGM(){
  if(bgmCtx) bgmCtx.close();
  bgmCtx=new(window.AudioContext||window.webkitAudioContext)();
  bgmNodes=[];

  // 432Hz ベース音
  const freqs=[432, 648, 864, 216, 540];
  const gains=[0.12, 0.06, 0.04, 0.08, 0.05];

  freqs.forEach((f,i)=>{
    const osc=bgmCtx.createOscillator();
    const gain=bgmCtx.createGain();
    const panner=bgmCtx.createStereoPanner();
    osc.type= i<2?'sine':'triangle';
    osc.frequency.value=f;
    gain.gain.value=gains[i];
    panner.pan.value=(Math.random()-0.5)*0.4;
    osc.connect(gain);gain.connect(panner);panner.connect(bgmCtx.destination);
    osc.start();
    bgmNodes.push({osc,gain});
  });

  // 528Hzのかすかな倍音
  const osc528=bgmCtx.createOscillator();
  const g528=bgmCtx.createGain();
  osc528.type='sine';osc528.frequency.value=528;
  g528.gain.value=0.03;
  osc528.connect(g528);g528.connect(bgmCtx.destination);
  osc528.start();bgmNodes.push({osc:osc528,gain:g528});

  // ゆっくりしたLFOで音量をゆらす
  bgmNodes.forEach(({gain},i)=>{
    const lfo=bgmCtx.createOscillator();
    const lfoGain=bgmCtx.createGain();
    lfo.frequency.value=0.05+i*0.02;
    lfoGain.gain.value=gain.gain.value*0.3;
    lfo.connect(lfoGain);lfoGain.connect(gain.gain);
    lfo.start();
  });
}

function stopBGM(){
  if(bgmCtx){bgmCtx.close();bgmCtx=null;bgmNodes=[];}
}

bgmBtn.addEventListener('click',()=>{
  if(bgmOn){
    stopBGM();bgmOn=false;
    bgmBtn.textContent='🎵 432Hz BGMを開始';
    bgmBtn.classList.remove('bgm-on');
  }else{
    startBGM();bgmOn=true;
    bgmBtn.textContent='🔊 432Hz 再生中…';
    bgmBtn.classList.add('bgm-on');
  }
});

// ── マイク ──
let aCtx2,anl,mStr,mOn=false;
const micBtn=document.getElementById('micBtn');

micBtn.addEventListener('click',async()=>{
  if(mOn){
    mOn=false;micBtn.textContent='🎙 声で変化させる';micBtn.classList.remove('active');
    if(mStr)mStr.getTracks().forEach(t=>t.stop());return;
  }
  try{
    const s=await navigator.mediaDevices.getUserMedia({audio:true});
    aCtx2=new(window.AudioContext||window.webkitAudioContext)();
    anl=aCtx2.createAnalyser();anl.fftSize=512;
    aCtx2.createMediaStreamSource(s).connect(anl);
    mStr=s;mOn=true;
    micBtn.textContent='🔴 声を聞いています…';micBtn.classList.add('active');
  }catch(e){micBtn.textContent='🎙 マイクを許可してください';}
});

function getV(){
  if(!mOn||!anl)return 0;
  const d=new Uint8Array(anl.frequencyBinCount);
  anl.getByteFrequencyData(d);
  return Math.min(d.reduce((a,b)=>a+b,0)/d.length/65,1);
}

// ── 呼吸 ──
function eio(t){return t<.5?2*t*t:-1+(4-2*t)*t;}
function updB(dt){
  bTimer+=dt;const dur=bDur[bPhase];
  pfEl.style.width=Math.min(bTimer/dur*100,100)+'%';
  const t=Math.min(bTimer/dur,1);
  if(bPhase===0)bScale=.87+.26*eio(t);
  else if(bPhase===1)bScale=1.13;
  else if(bPhase===2)bScale=1.13-.26*eio(t);
  else bScale=.87;
  if(bTimer>=dur){bTimer=0;bPhase=(bPhase+1)%4;btEl.textContent=bLbl[bPhase];}
}

// ── 描画ヘルパー ──
function poly(n,r,a0,fill,stroke,lw){
  mx.save();mx.rotate(a0);mx.beginPath();
  for(let i=0;i<=n;i++){const a=(i/n)*Math.PI*2-Math.PI/2;i===0?mx.moveTo(Math.cos(a)*r,Math.sin(a)*r):mx.lineTo(Math.cos(a)*r,Math.sin(a)*r);}
  mx.closePath();
  if(fill){mx.fillStyle=fill;mx.fill();}
  if(stroke){mx.strokeStyle=stroke;mx.lineWidth=lw||1;mx.stroke();}
  mx.restore();
}

// 蓮の花びら（1層）
function lotus(n,r,pw,ph,a0,fillCol,strokeCol){
  mx.save();mx.rotate(a0);
  for(let i=0;i<n;i++){
    const a=(i/n)*Math.PI*2;
    mx.save();mx.rotate(a);
    // 花びら（上向き楕円）
    mx.beginPath();mx.ellipse(0,-r,pw,ph,0,0,Math.PI*2);
    mx.fillStyle=fillCol;mx.fill();
    if(strokeCol){mx.strokeStyle=strokeCol;mx.lineWidth=.7;mx.stroke();}
    // 花びら内側の線
    mx.beginPath();mx.moveTo(0,-r+ph*.2);mx.lineTo(0,-r-ph*.7);
    mx.strokeStyle=strokeCol||'rgba(200,180,100,.3)';mx.lineWidth=.4;mx.stroke();
    mx.restore();
  }
  mx.restore();
}

// 梵字リング
function bijaring(n,r,a0,op,sz){
  mx.save();mx.rotate(a0);
  for(let i=0;i<n;i++){
    const a=(i/n)*Math.PI*2;
    mx.save();mx.translate(Math.cos(a)*r,Math.sin(a)*r);mx.rotate(a+Math.PI/2);
    mx.fillStyle=`rgba(215,195,110,${op})`;mx.font=`${sz}px serif`;
    mx.textAlign='center';mx.textBaseline='middle';
    mx.shadowColor='rgba(180,150,60,.8)';mx.shadowBlur=6;
    mx.fillText(BJ[(i*5+Math.floor(ts*.0004))%BJ.length],0,0);
    mx.shadowBlur=0;mx.restore();
  }
  mx.restore();
}

// ドットリング
function dots(n,r,a0,col,sz){
  mx.save();mx.rotate(a0);
  for(let i=0;i<n;i++){
    const a=(i/n)*Math.PI*2;
    mx.beginPath();mx.arc(Math.cos(a)*r,Math.sin(a)*r,sz,0,Math.PI*2);
    mx.fillStyle=col;mx.fill();
  }
  mx.restore();
}

// 光の放射線
function rays(n,r1,r2,a0,col,lw){
  mx.save();mx.rotate(a0);
  for(let i=0;i<n;i++){
    const a=(i/n)*Math.PI*2;
    mx.beginPath();mx.moveTo(Math.cos(a)*r1,Math.sin(a)*r1);
    mx.lineTo(Math.cos(a)*r2,Math.sin(a)*r2);
    mx.strokeStyle=col;mx.lineWidth=lw||.5;mx.stroke();
  }
  mx.restore();
}

// ── メインマンダラ描画 ──
function drawM(){
  mx.clearRect(0,0,SZ,SZ);
  const v=vl;
  const sc=bScale+v*.1;

  mx.save();mx.translate(CX,CY);mx.scale(sc,sc);

  // 背景グロー
  const bg=mx.createRadialGradient(0,0,0,0,0,200);
  bg.addColorStop(0,`rgba(20,50,180,${.15+v*.08})`);
  bg.addColorStop(.5,`rgba(10,25,100,.08)`);
  bg.addColorStop(1,'rgba(0,0,0,0)');
  mx.beginPath();mx.arc(0,0,205,0,Math.PI*2);
  mx.fillStyle=bg;mx.fill();

  // ── 最外層：光の放射 ──
  rays(48,175,200,rot*.3,`rgba(120,180,255,${.12+v*.1})`,1);
  rays(24,170,205,rot*.3+Math.PI/24,`rgba(200,170,80,${.2+v*.12})`,1.5);

  // ── 層1：外12角形 ──
  poly(12,182,rot*.4,null,`rgba(140,195,255,${.45+v*.12})`,1.2);
  poly(12,174,rot*.4+Math.PI/12,null,`rgba(180,150,65,.35)`,.7);
  dots(48,186,rot*.3,`rgba(100,160,255,${.2+v*.1})`,1);
  dots(24,178,rot*.4,`rgba(210,180,80,${.5+v*.15})`,2);
  bijaring(24,188,rot*.4,.62+v*.18,9);

  // ── 層2：蓮の花びら（外）──
  lotus(16,155,12,22,-rot*.5,
    `rgba(20,60,180,${.18+v*.08})`,
    `rgba(100,160,255,${.4+v*.12})`);
  dots(32,148,rot*.6,`rgba(160,210,255,.28)`,1);
  poly(16,140,-rot*.3,null,`rgba(160,210,255,${.3+v*.1})`,.8);

  // ── 層3：中間 ──
  poly(12,118,rot*.7,`rgba(8,22,90,.18)`,`rgba(80,150,255,${.42+v*.1})`,1);
  lotus(12,105,10,18,rot*.5,
    `rgba(15,45,160,${.2+v*.1})`,
    `rgba(120,180,255,${.45+v*.1})`);
  dots(24,112,rot*.7,`rgba(200,175,82,.4)`,1.5);
  bijaring(8,112,rot*.6,.58+v*.15,11);

  // ── 層4：内側蓮 ──
  lotus(8,76,9,15,-rot*.8,
    `rgba(10,35,140,${.25+v*.1})`,
    `rgba(140,195,255,${.5+v*.1})`);
  poly(8,68,-rot*.8,null,`rgba(180,155,68,.42)`,.9);
  poly(8,60,-rot*.8+Math.PI/8,null,`rgba(80,150,255,${.35+v*.1})`,.7);
  dots(16,65,-rot*.8,`rgba(200,175,82,.45)`,1.5);
  bijaring(8,70,-rot*.8,.52+v*.12,10);

  // ── 最内層：小蓮 ──
  lotus(6,42,7,12,rot*1.2,
    `rgba(5,25,100,${.3+v*.12})`,
    `rgba(160,210,255,${.55+v*.12})`);
  poly(6,35,rot*1.2,null,`rgba(190,165,72,.4)`,.8);
  dots(12,38,rot*1.2,`rgba(165,210,255,.4)`,1.2);

  // ── 声の光線 ──
  if(v>.04){
    for(let i=0;i<24;i++){
      const a=(i/24)*Math.PI*2+rot;
      mx.beginPath();mx.moveTo(Math.cos(a)*44,Math.sin(a)*44);
      mx.lineTo(Math.cos(a)*(188+v*25),Math.sin(a)*(188+v*25));
      mx.strokeStyle=`rgba(160,215,255,${v*.15})`;mx.lineWidth=.5;mx.stroke();
    }
  }

  // ── 中心グロー ──
  const cg=mx.createRadialGradient(0,0,0,0,0,40);
  cg.addColorStop(0,`rgba(180,225,255,${.9+v*.1})`);
  cg.addColorStop(.3,`rgba(80,130,240,.85)`);
  cg.addColorStop(.65,`rgba(35,65,185,.55)`);
  cg.addColorStop(1,'rgba(10,20,80,0)');
  mx.beginPath();mx.arc(0,0,40+v*12,0,Math.PI*2);
  mx.fillStyle=cg;mx.fill();

  // 中心ドットリング
  dots(16,28,rot*2,`rgba(210,185,105,.65)`,1.5);

  // 中心梵字 ॐ
  mx.fillStyle=`rgba(240,220,140,${.9+v*.1})`;
  mx.font=`${22+v*9}px serif`;
  mx.textAlign='center';mx.textBaseline='middle';
  mx.shadowColor='rgba(200,170,80,.95)';mx.shadowBlur=15+v*22;
  mx.fillText('ॐ',0,0);mx.shadowBlur=0;

  mx.restore();
}

// ── 波形グラフ ──
function drawWave(){
  wx.clearRect(0,0,WW,WH);
  if(wDir===1){wPos++;if(wPos>=WW-1)wDir=-1;}
  else{wPos--;if(wPos<=0)wDir=1;}
  wBuf[wPos]=vl;

  const bW=3,gap=1,total=Math.floor(WW/(bW+gap));
  for(let i=0;i<total;i++){
    const idx=Math.round(i/(total-1)*(WW-1));
    const v2=wBuf[idx];
    const h=Math.max(2,v2*(WH-8));
    const x=i*(bW+gap),y=(WH-h)/2;
    const dist=Math.abs(idx-wPos)/WW;
    const r=Math.round(50+dist*180),g=Math.round(120+dist*60),b=Math.round(255-dist*80);
    const al=.25+v2*.7;
    const gr=wx.createLinearGradient(x,y,x,y+h);
    gr.addColorStop(0,`rgba(${r},${g},${b},${al*.5})`);
    gr.addColorStop(.5,`rgba(${r},${g},${b},${al})`);
    gr.addColorStop(1,`rgba(${r},${g},${b},${al*.5})`);
    wx.fillStyle=gr;
    wx.beginPath();wx.roundRect(x,y,bW,h,1);wx.fill();
  }
  const px=wPos/(WW-1)*WW;
  wx.beginPath();wx.moveTo(px,3);wx.lineTo(px,WH-3);
  wx.strokeStyle=`rgba(200,230,255,${.35+vl*.4})`;wx.lineWidth=1.5;wx.stroke();
  wx.beginPath();wx.moveTo(0,WH/2);wx.lineTo(WW,WH/2);
  wx.strokeStyle='rgba(50,90,200,.12)';wx.lineWidth=.5;wx.stroke();
}

// ── ループ ──
function loop(t){
  if(!lt)lt=t;const dt=t-lt;lt=t;ts=t;
  const raw=getV();vm.push(raw);if(vm.length>8)vm.shift();
  vl=vm.reduce((a,b)=>a+b,0)/vm.length;
  updB(dt);
  const sp=.00015+vl*.0012;
  rot+=sp*dt;rot2+=sp*1.6*dt;rot3+=sp*.5*dt;
  drawM();drawWave();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
